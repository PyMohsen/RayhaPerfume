{% extends 'base.html' %}
{% block title %}تکمیل پروفایل{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">👤</span>
            <h1 class="auth-title">تکمیل اطلاعات</h1>
            <p class="auth-subtitle">لطفاً اطلاعات خود را تکمیل کنید</p>
        </div>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <span class="form-error">{{ field.errors.0 }}</span>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-block">ذخیره اطلاعات</button>
        </form>
    </div>
</div>
{% endblock %}
